<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#22c55e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fridge Finder" />
  <title>Fridge Finder</title>

  <style>
    :root {
      --bg: #f7faf7;
      --card: #ffffff;
      --text: #102015;
      --muted: #627066;
      --line: #dde8df;
      --green: #22c55e;
      --green-dark: #15803d;
      --yellow: #f59e0b;
      --red: #ef4444;
      --shadow: 0 12px 30px rgba(16, 32, 21, 0.08);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.18), transparent 28rem),
        var(--bg);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(100%, 560px);
      min-height: 100vh;
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 2px 18px;
    }

    .title-block h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .title-block p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .badge {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: var(--card);
      box-shadow: var(--shadow);
      font-size: 1.55rem;
    }

    .panel {
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(221, 232, 223, 0.92);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      backdrop-filter: blur(18px);
    }

    .section {
      margin-bottom: 14px;
    }

    .section-toggle {
      width: 100%;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 2px 2px 12px;
      text-align: left;
      font-weight: 900;
    }

    .section-toggle span:first-child {
      font-size: 1.05rem;
    }

    .chevron {
      flex: 0 0 34px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: #f3f6f3;
      color: var(--muted);
      line-height: 1;
      font-size: 1rem;
      padding: 0;
      transition: transform 160ms ease;
    }

    .section.collapsed .chevron {
      transform: rotate(-90deg);
    }

    .section-body {
      display: block;
    }

    .section.collapsed .section-body {
      display: none;
    }

    .form-grid {
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .field {
      min-width: 0;
    }

    .field label {
      display: block;
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .field input {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fbfdfb;
      color: var(--text);
      padding: 12px 14px;
      outline: none;
    }

    .field input[type="date"] {
      -webkit-appearance: none;
      appearance: none;
    }

    .field input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.12);
    }

    .primary-btn {
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 17px;
      background: var(--green);
      color: #ffffff;
      font-weight: 800;
      box-shadow: 0 12px 22px rgba(34, 197, 94, 0.22);
    }

    .primary-btn:active,
    .small-btn:active,
    .tab:active,
    .section-toggle:active,
    .day:active {
      transform: scale(0.985);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
      margin: 0;
    }

    .tab {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .tab.active {
      border-color: var(--green);
      background: #dcfce7;
      color: var(--green-dark);
    }

    .summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 4px 0 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .item {
      display: grid;
      gap: 10px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px;
      box-shadow: 0 8px 18px rgba(16, 32, 21, 0.05);
    }

    .item-main {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .item-name {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .item-qty {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .pill {
      flex: 0 0 auto;
      align-self: flex-start;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 0.78rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .pill.good {
      background: #dcfce7;
      color: #166534;
    }

    .pill.soon {
      background: #fef3c7;
      color: #92400e;
    }

    .pill.urgent,
    .pill.expired {
      background: #fee2e2;
      color: #991b1b;
    }

    .item-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .delete-btn,
    .small-btn {
      border: 0;
      border-radius: 999px;
      background: #f3f6f3;
      color: #9b1c1c;
      padding: 8px 11px;
      font-size: 0.82rem;
      font-weight: 900;
    }

    .small-btn {
      color: var(--green-dark);
    }

    .empty {
      padding: 26px 18px;
      text-align: center;
      color: var(--muted);
    }

    .empty strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
      font-size: 1.05rem;
    }

    .calendar-shell {
      display: grid;
      gap: 14px;
    }

    .calendar-controls {
      display: grid;
      grid-template-columns: 72px 1fr 72px;
      align-items: center;
      gap: 10px;
    }

    .month-title {
      margin: 0;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 900;
      line-height: 1.2;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    .weekday {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
      padding-bottom: 2px;
    }

    .day {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      aspect-ratio: 1 / 1;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.88);
      padding: 6px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 4px;
      overflow: hidden;
      color: var(--text);
    }

    .day.empty-day {
      visibility: hidden;
      pointer-events: none;
    }

    .day.today {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.12);
    }

    .day.selected {
      border-color: var(--green-dark);
      box-shadow: 0 0 0 3px rgba(21, 128, 61, 0.12);
    }

    .day.has-items {
      background: #fbfdfb;
    }

    .day-number {
      color: var(--text);
      font-size: 0.86rem;
      font-weight: 900;
      line-height: 1;
    }

    .day-count {
      color: var(--muted);
      font-size: 0.64rem;
      font-weight: 800;
      line-height: 1;
      min-height: 0.64rem;
    }

    .day-dots {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .day-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #bbf7d0;
    }

    .day-dot.good {
      background: #86efac;
    }

    .day-dot.soon {
      background: #fcd34d;
    }

    .day-dot.urgent,
    .day-dot.expired {
      background: #fca5a5;
    }

    .selected-day-panel {
      border-top: 1px solid var(--line);
      padding-top: 14px;
      display: grid;
      gap: 10px;
    }

    .selected-day-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 900;
    }

    .selected-day-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .selected-day-list {
      display: grid;
      gap: 10px;
    }

    .selected-day-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      padding: 12px;
    }

    .selected-day-item-main {
      min-width: 0;
    }

    .selected-day-item-name {
      margin: 0;
      font-size: 0.98rem;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .selected-day-item-meta {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .selected-day-empty {
      color: var(--muted);
      font-size: 0.92rem;
      padding: 4px 0 2px;
    }

    .install-card {
      display: none;
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .install-card.show {
      display: block;
    }

    .install-card strong {
      color: var(--text);
    }

    @media (min-width: 480px) {
      .form-grid {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }

      .field.name {
        grid-column: 1 / -1;
      }

      .primary-btn {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="title-block">
        <h1>Fridge Finder</h1>
        <p>Track food before it goes bad.</p>
      </div>
      <div class="badge" aria-hidden="true">🥬</div>
    </header>

    <section class="section panel" data-section="form">
      <button class="section-toggle" type="button" aria-expanded="true">
        <span>Add food</span>
        <span class="chevron" aria-hidden="true">⌄</span>
      </button>
      <div class="section-body">
        <form id="itemForm" class="form-grid">
          <div class="field name">
            <label for="name">Food name</label>
            <input id="name" name="name" type="text" placeholder="Milk, chicken, spinach" autocomplete="off" required />
          </div>

          <div class="field">
            <label for="expirationDate">Expiration date</label>
            <input id="expirationDate" name="expirationDate" type="date" required />
          </div>

          <div class="field">
            <label for="quantity">Quantity</label>
            <input id="quantity" name="quantity" type="text" placeholder="1 carton, 2 lbs, half bag" autocomplete="off" required />
          </div>

          <button class="primary-btn" type="submit">Add Item</button>
        </form>
      </div>
    </section>

    <section class="section" data-section="filters">
      <button class="section-toggle" type="button" aria-expanded="true">
        <span>Filters</span>
        <span class="chevron" aria-hidden="true">⌄</span>
      </button>
      <div class="section-body">
        <nav class="tabs" aria-label="Expiration filters">
          <button class="tab active" type="button" data-filter="all">All</button>
          <button class="tab" type="button" data-filter="7">7 days</button>
          <button class="tab" type="button" data-filter="3">3 days</button>
          <button class="tab" type="button" data-filter="1">1 day</button>
          <button class="tab" type="button" data-filter="expired">Expired</button>
        </nav>
      </div>
    </section>

    <section class="section panel" data-section="calendar">
      <button class="section-toggle" type="button" aria-expanded="true">
        <span>Calendar</span>
        <span class="chevron" aria-hidden="true">⌄</span>
      </button>
      <div class="section-body">
        <div class="calendar-shell">
          <div class="calendar-controls">
            <button id="prevMonth" class="small-btn" type="button">Prev</button>
            <h2 id="monthTitle" class="month-title"></h2>
            <button id="nextMonth" class="small-btn" type="button">Next</button>
          </div>

          <div id="calendar" class="calendar-grid" aria-live="polite"></div>

          <div id="selectedDayPanel" class="selected-day-panel"></div>
        </div>
      </div>
    </section>

    <section class="section panel" data-section="list">
      <button class="section-toggle" type="button" aria-expanded="true">
        <span>List</span>
        <span class="chevron" aria-hidden="true">⌄</span>
      </button>
      <div class="section-body">
        <div class="summary">
          <span id="summaryText">0 items</span>
          <span id="todayText"></span>
        </div>
        <div id="list" class="list" aria-live="polite"></div>
      </div>
    </section>

    <section id="installCard" class="panel install-card">
      <strong>Save to your iPhone home screen:</strong><br />
      Open this page in Safari, tap Share, then tap Add to Home Screen.
    </section>
  </main>

  <script>
    const STORAGE_KEY = "fridgeFinderItems";
    const SECTION_STATE_KEY = "fridgeFinderSections";

    const form = document.getElementById("itemForm");
    const list = document.getElementById("list");
    const tabs = document.querySelectorAll(".tab");
    const summaryText = document.getElementById("summaryText");
    const todayText = document.getElementById("todayText");
    const installCard = document.getElementById("installCard");
    const calendar = document.getElementById("calendar");
    const monthTitle = document.getElementById("monthTitle");
    const prevMonth = document.getElementById("prevMonth");
    const nextMonth = document.getElementById("nextMonth");
    const selectedDayPanel = document.getElementById("selectedDayPanel");

    let activeFilter = "all";
    let items = loadItems();
    let calendarDate = getTodayDateOnly();
    let selectedCalendarDate = toDateInputValue(getTodayDateOnly());
    let sectionState = loadSectionState();

    function loadItems() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveItems() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function loadSectionState() {
      try {
        return JSON.parse(localStorage.getItem(SECTION_STATE_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveSectionState() {
      localStorage.setItem(SECTION_STATE_KEY, JSON.stringify(sectionState));
    }

    function getTodayDateOnly() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }

    function parseLocalDate(dateString) {
      const [year, month, day] = dateString.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function toDateInputValue(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatDate(dateString) {
      return parseLocalDate(dateString).toLocaleDateString(undefined, {
        month: "short",
        day: "numeric",
        year: "numeric"
      });
    }

    function getDaysUntil(dateString) {
      const today = getTodayDateOnly();
      const expiration = parseLocalDate(dateString);
      const msPerDay = 1000 * 60 * 60 * 24;
      return Math.round((expiration - today) / msPerDay);
    }

    function getStatus(daysUntil) {
      if (daysUntil < 0) return { text: "Expired", className: "expired" };
      if (daysUntil === 0) return { text: "Today", className: "urgent" };
      if (daysUntil === 1) return { text: "1 day", className: "urgent" };
      if (daysUntil <= 7) return { text: `${daysUntil} days`, className: "soon" };
      return { text: `${daysUntil} days`, className: "good" };
    }

    function getFilteredItems() {
      const sortedItems = [...items].sort((a, b) => {
        return parseLocalDate(a.expirationDate) - parseLocalDate(b.expirationDate);
      });

      if (activeFilter === "all") return sortedItems;

      return sortedItems.filter((item) => {
        const daysUntil = getDaysUntil(item.expirationDate);

        if (activeFilter === "expired") return daysUntil < 0;
        return daysUntil >= 0 && daysUntil <= Number(activeFilter);
      });
    }

    function getItemsForDate(dateKey, sourceItems = getFilteredItems()) {
      return sourceItems.filter((item) => item.expirationDate === dateKey);
    }

    function getHighestPriorityClass(dayItems) {
      if (!dayItems.length) return "good";

      let highest = "good";

      dayItems.forEach((item) => {
        const statusClass = getStatus(getDaysUntil(item.expirationDate)).className;

        if (statusClass === "expired") {
          highest = "expired";
          return;
        }

        if (statusClass === "urgent" && highest !== "expired") {
          highest = "urgent";
          return;
        }

        if (statusClass === "soon" && highest !== "expired" && highest !== "urgent") {
          highest = "soon";
        }
      });

      return highest;
    }

    function render() {
      renderList();
      renderCalendar();
    }

    function renderList() {
      const filteredItems = getFilteredItems();
      const label = filteredItems.length === 1 ? "item" : "items";

      todayText.textContent = getTodayDateOnly().toLocaleDateString(undefined, {
        month: "short",
        day: "numeric"
      });

      summaryText.textContent = `${filteredItems.length} ${label}`;
      list.innerHTML = "";

      if (filteredItems.length === 0) {
        list.innerHTML = `
          <div class="empty">
            <strong>No food found here.</strong>
            Add an item or switch filters.
          </div>
        `;
        return;
      }

      filteredItems.forEach((item) => {
        const daysUntil = getDaysUntil(item.expirationDate);
        const status = getStatus(daysUntil);
        const card = document.createElement("article");
        card.className = "item";

        card.innerHTML = `
          <div class="item-main">
            <div>
              <h2 class="item-name"></h2>
              <p class="item-qty"></p>
            </div>
            <span class="pill ${status.className}">${status.text}</span>
          </div>
          <div class="item-meta">
            <span>Expires ${formatDate(item.expirationDate)}</span>
            <button class="delete-btn" type="button">Delete</button>
          </div>
        `;

        card.querySelector(".item-name").textContent = item.name;
        card.querySelector(".item-qty").textContent = item.quantity;
        card.querySelector(".delete-btn").addEventListener("click", () => deleteItem(item.id));

        list.appendChild(card);
      });
    }

    function renderCalendar() {
      const year = calendarDate.getFullYear();
      const month = calendarDate.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const weekdays = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      const filteredItems = getFilteredItems();

      monthTitle.textContent = firstDay.toLocaleDateString(undefined, {
        month: "long",
        year: "numeric"
      });

      calendar.innerHTML = "";

      weekdays.forEach((dayName) => {
        const weekday = document.createElement("div");
        weekday.className = "weekday";
        weekday.textContent = dayName;
        calendar.appendChild(weekday);
      });

      for (let i = 0; i < firstDay.getDay(); i++) {
        const emptyDay = document.createElement("div");
        emptyDay.className = "day empty-day";
        calendar.appendChild(emptyDay);
      }

      for (let dayNumber = 1; dayNumber <= lastDay.getDate(); dayNumber++) {
        const date = new Date(year, month, dayNumber);
        const dateKey = toDateInputValue(date);
        const dayItems = getItemsForDate(dateKey, filteredItems);
        const isToday = dateKey === toDateInputValue(getTodayDateOnly());
        const isSelected = dateKey === selectedCalendarDate;
        const priorityClass = getHighestPriorityClass(dayItems);
        const countLabel = getCountLabel(dayItems.length);
        const day = document.createElement("button");

        day.type = "button";
        day.className = "day";

        if (dayItems.length > 0) day.classList.add("has-items");
        if (isToday) day.classList.add("today");
        if (isSelected) day.classList.add("selected");

        day.innerHTML = `
          <div class="day-number">${dayNumber}</div>
          <div class="day-count">${countLabel || "&nbsp;"}</div>
          <div class="day-dots">
            ${renderDayDots(dayItems, priorityClass)}
          </div>
        `;

        day.addEventListener("click", () => {
          selectedCalendarDate = dateKey;
          renderCalendar();
        });

        calendar.appendChild(day);
      }

      const totalSlots = firstDay.getDay() + lastDay.getDate();
      const trailingSlots = (7 - (totalSlots % 7)) % 7;

      for (let i = 0; i < trailingSlots; i++) {
        const emptyDay = document.createElement("div");
        emptyDay.className = "day empty-day";
        calendar.appendChild(emptyDay);
      }

      renderSelectedDayPanel(filteredItems);
    }

    function getCountLabel(count) {
      if (count === 0) return "";
      if (count === 1) return "1 item";
      return `${count} items`;
    }

    function renderDayDots(dayItems, priorityClass) {
      if (!dayItems.length) return "";

      return dayItems
        .slice(0, 3)
        .map(() => `<span class="day-dot ${priorityClass}"></span>`)
        .join("");
    }

    function renderSelectedDayPanel(sourceItems) {
      const dayItems = getItemsForDate(selectedCalendarDate, sourceItems);
      const selectedDate = parseLocalDate(selectedCalendarDate);
      const title = selectedDate.toLocaleDateString(undefined, {
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric"
      });
      const subtitle = getCountLabel(dayItems.length) || "No items";

      selectedDayPanel.innerHTML = "";

      const heading = document.createElement("div");
      heading.innerHTML = `
        <h3 class="selected-day-title">${title}</h3>
        <p class="selected-day-subtitle">${subtitle} expire this day</p>
      `;
      selectedDayPanel.appendChild(heading);

      if (dayItems.length === 0) {
        const empty = document.createElement("div");
        empty.className = "selected-day-empty";
        empty.textContent = "No items for this day.";
        selectedDayPanel.appendChild(empty);
        return;
      }

      const listEl = document.createElement("div");
      listEl.className = "selected-day-list";

      dayItems.forEach((item) => {
        const status = getStatus(getDaysUntil(item.expirationDate));
        const card = document.createElement("div");
        card.className = "selected-day-item";

        card.innerHTML = `
          <div class="selected-day-item-main">
            <p class="selected-day-item-name"></p>
            <p class="selected-day-item-meta"></p>
          </div>
          <span class="pill ${status.className}">${status.text}</span>
        `;

        card.querySelector(".selected-day-item-name").textContent = item.name;
        card.querySelector(".selected-day-item-meta").textContent = item.quantity;
        listEl.appendChild(card);
      });

      selectedDayPanel.appendChild(listEl);
    }

    function addItem(event) {
      event.preventDefault();

      const formData = new FormData(form);
      const item = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        name: formData.get("name").trim(),
        expirationDate: formData.get("expirationDate"),
        quantity: formData.get("quantity").trim()
      };

      if (!item.name || !item.expirationDate || !item.quantity) return;

      items.push(item);
      selectedCalendarDate = item.expirationDate;
      calendarDate = parseLocalDate(item.expirationDate);
      saveItems();
      form.reset();
      document.getElementById("name").focus();
      render();
    }

    function deleteItem(id) {
      items = items.filter((item) => item.id !== id);
      saveItems();
      render();
    }

    function setActiveFilter(filter) {
      activeFilter = filter;

      tabs.forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.filter === filter);
      });

      render();
    }

    function setupSectionToggles() {
      document.querySelectorAll(".section").forEach((section) => {
        const sectionName = section.dataset.section;
        const toggle = section.querySelector(".section-toggle");

        if (!toggle || !sectionName) return;

        if (sectionState[sectionName] === false) {
          section.classList.add("collapsed");
          toggle.setAttribute("aria-expanded", "false");
        }

        toggle.addEventListener("click", () => {
          const isCollapsed = section.classList.toggle("collapsed");
          sectionState[sectionName] = !isCollapsed;
          toggle.setAttribute("aria-expanded", String(!isCollapsed));
          saveSectionState();
        });
      });
    }

    function setupPwaFiles() {
      const iconSvg = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <rect width="512" height="512" rx="112" fill="#22c55e"/>
          <text x="50%" y="57%" text-anchor="middle" font-size="260" font-family="Arial">🥬</text>
        </svg>
      `;

      const iconUrl = URL.createObjectURL(new Blob([iconSvg], { type: "image/svg+xml" }));
      const manifest = {
        name: "Fridge Finder",
        short_name: "Fridge",
        start_url: ".",
        display: "standalone",
        background_color: "#f7faf7",
        theme_color: "#22c55e",
        icons: [
          {
            src: iconUrl,
            sizes: "512x512",
            type: "image/svg+xml",
            purpose: "any maskable"
          }
        ]
      };

      const manifestUrl = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" }));
      const manifestLink = document.createElement("link");
      manifestLink.rel = "manifest";
      manifestLink.href = manifestUrl;
      document.head.appendChild(manifestLink);

      const appleIcon = document.createElement("link");
      appleIcon.rel = "apple-touch-icon";
      appleIcon.href = iconUrl;
      document.head.appendChild(appleIcon);
    }

    function setupServiceWorker() {
      if (!("serviceWorker" in navigator)) return;

      const workerCode = `
        const CACHE_NAME = "fridge-finder-v1";
        self.addEventListener("install", event => {
          event.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(["./"])));
          self.skipWaiting();
        });
        self.addEventListener("activate", event => {
          event.waitUntil(self.clients.claim());
        });
        self.addEventListener("fetch", event => {
          event.respondWith(caches.match(event.request).then(response => response || fetch(event.request)));
        });
      `;

      const workerUrl = URL.createObjectURL(new Blob([workerCode], { type: "text/javascript" }));
      navigator.serviceWorker.register(workerUrl).catch(() => {});
    }

    function setupInstallHint() {
      const isStandalone = window.navigator.standalone || window.matchMedia("(display-mode: standalone)").matches;
      const isIos = /iphone|ipad|ipod/i.test(window.navigator.userAgent);

      if (isIos && !isStandalone) {
        installCard.classList.add("show");
      }
    }

    form.addEventListener("submit", addItem);

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => setActiveFilter(tab.dataset.filter));
    });

    prevMonth.addEventListener("click", () => {
      calendarDate = new Date(calendarDate.getFullYear(), calendarDate.getMonth() - 1, 1);
      renderCalendar();
    });

    nextMonth.addEventListener("click", () => {
      calendarDate = new Date(calendarDate.getFullYear(), calendarDate.getMonth() + 1, 1);
      renderCalendar();
    });

    setupSectionToggles();
    setupPwaFiles();
    setupServiceWorker();
    setupInstallHint();
    render();
  </script>
</body>
</html>
